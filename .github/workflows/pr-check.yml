name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: JS / HTML syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: |
          set -e
          shopt -s nullglob
          fail=0
          for f in $(git ls-files '*.js'); do
            echo "checking $f"
            if ! node --check "$f"; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more JS files failed node --check"
            exit 1
          fi

      - name: Check HTML files exist and are non-empty
        run: |
          set -e
          missing=0
          for f in $(git ls-files '*.html'); do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::HTML file is empty"
              missing=1
            fi
          done
          exit "$missing"

  unit:
    name: Unit tests (rules / maps / factions)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Run unit tests
        run: npm run test:unit

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for static file server)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/.results/
          retention-days: 7
